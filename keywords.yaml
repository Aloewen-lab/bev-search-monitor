# BEV Search Monitor — Master Keyword List
#
# Derived from the brief's competitor table (status 2026).
# Review carefully before running fetcher.py — every keyword costs API quota
# and shapes the "Share of BEV Brand Interest" denominator.
#
# Conventions:
#   - For PURE BEV brands, the standalone brand name is included (all intent
#     is BEV-relevant by definition).
#   - For MIXED brands, ONLY model-specific keywords (standalone brand would
#     conflate ICE intent into the BEV share).
#   - For "smart": pure BEV since the Geely JV, BUT the standalone keyword
#     "smart" is intentionally excluded — too noisy (smart watch, smart home,
#     smart phone, smart TV...). Models only.
#   - Spelling variants (e.g. "VW ID.3" vs "Volkswagen ID.3") are both listed
#     so we capture all common search forms; Google Ads aggregates them per
#     keyword so this is additive, not double-counting.
#   - Brands with no in-market BEV (Bentley, Lamborghini, Land Rover BEV not
#     yet shipping, Seat) are skipped — re-add when models launch.

focal_brand: smart

brands:

  smart:
    pure_bev: true
    keywords:
      - "smart #1"
      - "smart #3"
      - "smart #5"
      - "smart hashtag 1"
      - "smart hashtag 3"
      - "smart hashtag 5"

